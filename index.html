<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>일정 기록</title>
  <style>
    :root { --primary: #3498db; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa; margin: 0; padding: 0; color: #333;
    }
    .container {
      width: 100%; max-width: 390px; margin: 0 auto; background: white;
      border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden; box-sizing: border-box;
    }
    .tab-content {
      padding: 8px 24px 24px;
      display: flex; flex-direction: column;
    }
    /* CLOCK */
    .clock-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; flex-shrink: 0;
    }
    .live-clock {
      flex: 1; text-align: center; font-size: 1.1rem;
      font-weight: 700; color: #2c3e50; letter-spacing: -0.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gear-btn {
      background: none; border: none; padding: 4px 0; cursor: pointer;
      font-size: 1.65rem; line-height: 1; color: #888;
      transition: color 0.2s; position: relative; top: -10px;
    }
    .gear-btn:hover { color: var(--primary); }
    /* CALENDAR */
    .calendar-wrap {
      margin-bottom: 20px; border: 1px solid #eee;
      border-radius: 12px; overflow: hidden; flex-shrink: 0;
    }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: #f0f4f8;
    }
    .cal-nav button {
      background: none; border: 1px solid #ccc; color: #555;
      padding: 4px 12px; font-size: 14px; border-radius: 6px; cursor: pointer;
    }
    .cal-nav button:hover { background: #e2e8f0; }
    .cal-month-label { font-weight: 700; font-size: 1rem; color: #2c3e50; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: white; }
    .cal-day-header {
      text-align: center; font-size: 0.75rem; font-weight: 600;
      color: #999; padding: 8px 0; border-bottom: 1px solid #eee;
    }
    .cal-day {
      text-align: center; padding: 8px 4px; font-size: 0.85rem;
      cursor: pointer; transition: background 0.15s; position: relative; color: #333;
    }
    .cal-day:hover { background: #eef4fb; }
    .cal-day.other-month { color: #ccc; }
    .cal-day.today { font-weight: 700; color: var(--primary); }
    .cal-day.selected { background: var(--primary); color: white !important; font-weight: 700; }
    .cal-day.has-log::after {
      content: ''; display: block; width: 5px; height: 5px;
      border-radius: 50%; background: var(--primary); margin: 2px auto 0;
    }
    .cal-day.selected.has-log::after { background: white; }
    /* TASK GRID */
    .task-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 10px; margin-bottom: 20px; flex-shrink: 0;
    }
    .task-btn {
      background: #fff; border: 2px solid #ddd; padding: 12px 8px;
      border-radius: 10px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); color: #333;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(52,152,219,0.2);
    }
    .task-btn:hover {
      border-color: var(--primary); transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(52,152,219,0.2);
    }
    .task-btn:active { transform: scale(0.95); }
    /* LOG */
    .log-list { list-style: none; padding: 0; margin-top: 0; }
    .log-item {
      background: #f8f9fa; padding: 14px 18px; margin: 0 0 8px;
      border-radius: 10px; display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center; gap: 12px; border-left: 5px solid var(--primary);
    }
    .log-time { font-size: 0.9rem; color: #777; font-weight: 500; }
    .delete-btn { background: #f08080; padding: 8px 14px; font-size: 14px; border-radius: 8px; border: none; color: white; cursor: pointer; }
    .delete-btn:hover { background: #e74c3c; }
    .edit-btn { background: #3498db; color: white; padding: 8px 14px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; }
    .edit-btn:hover { background: #2980b9; }
    .empty { text-align: center; color: #95a5a6; padding: 60px 20px; font-size: 1.1rem; }
    /* MANAGE */
    .task-manage-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; background: #f8f9fa; margin: 8px 0;
      border-radius: 10px; cursor: grab; user-select: none;
    }
    .task-manage-item.dragging { opacity: 0.4; cursor: grabbing; }
    .task-manage-item.drag-over { border: 2px dashed var(--primary); background: #eef4fb; }
    .drag-handle { color: #bbb; font-size: 1.1rem; margin-right: 10px; cursor: grab; }
    .add-area { display: flex; gap: 12px; margin-top: 24px; flex-shrink: 0; flex-wrap: wrap; }
    input[type="text"] {
      flex: 1; padding: 14px; border: 1px solid #ddd;
      border-radius: 10px; font-size: 16px;
    }
    button {
      background: var(--primary); color: white; border: none;
      padding: 14px 24px; border-radius: 10px; font-size: 16px; cursor: pointer;
    }
    /* EDIT MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 14px; padding: 28px;
      width: 340px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .modal-box h3 { margin: 0 0 20px; font-size: 1.1rem; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
    .modal-field input[type="text"] { padding: 10px 12px; font-size: 15px; border-radius: 8px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-cancel-modal { background: #f0f0f0; color: #555; }
    .btn-save-modal { background: var(--primary); color: white; font-weight: 700; }
    /* TIME PICKER */
    .time-picker { display: flex; align-items: center; gap: 8px; }
    .time-picker-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .time-picker-col span {
      font-size: 1.3rem; font-weight: 700; width: 48px; text-align: center;
      padding: 6px 0; background: #f0f4f8; border-radius: 8px; color: #2c3e50; cursor: text;
    }
    .time-picker-col button {
      background: none; border: 1px solid #ddd; border-radius: 6px;
      color: #555; padding: 3px 10px; font-size: 14px; cursor: pointer; width: 48px;
    }
    .time-picker-col button:hover { background: #e2e8f0; }
    .time-sep { font-size: 1.4rem; font-weight: 700; color: #aaa; padding-bottom: 4px; }

    /* MEMO/CALENDAR SUB TABS */
    .sub-tabs {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: #f0f4f8; border-radius: 10px; padding: 4px; flex-shrink: 0;
    }
    .sub-tab {
      flex: 1; padding: 8px; border: none; border-radius: 7px;
      background: transparent; color: #888; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .sub-tab.active { background: white; color: #2c3e50; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .memo-area {
      flex: 1; width: 100%; border: 1px solid #eee; border-radius: 10px;
      padding: 14px; font-size: 15px; font-family: inherit; resize: none;
      outline: none; color: #333; line-height: 1.6; box-sizing: border-box;
      min-height: 126px;
    }
    .memo-area:focus { border-color: var(--primary); }
    .memo-save-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; flex-shrink: 0; }
    .memo-date-label { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f9fa;">
  <div style="background:white;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1);width:320px;">
    <h2 style="margin:0 0 24px;text-align:center;color:#2c3e50;">일정 기록</h2>
    <input id="loginEmail" type="email" placeholder="이메일" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box;margin-bottom:12px;">
    <input id="loginPw" type="password" placeholder="비밀번호" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box;margin-bottom:8px;">
    <div id="loginErr" style="color:#e74c3c;font-size:13px;margin-bottom:8px;min-height:18px;"></div>
    <button onclick="doLogin()" style="width:100%;padding:12px;background:#3498db;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">로그인</button>
  </div>
</div>

<div id="appScreen" style="display:none;">
<div class="container">
  <div id="tab0" class="tab-content">
    <div class="clock-row">
      <div class="live-clock" id="liveClock"></div>
      <div style="display:flex;flex-direction:column;align-items:center;position:relative;top:-5px;">
        <span style="font-size:9px;color:#bbb;letter-spacing:0.05em;">ver.6</span>
        <button class="gear-btn" style="top:0;" onclick="switchTab(1)" title="업무 목록 관리">⚙️</button>
      </div>
    </div>

    <!-- MEMO / CALENDAR SUB TABS -->
    <div class="sub-tabs">
      <button class="sub-tab active" id="subTabMemo" onclick="switchSubTab('memo')">📝 메모</button>
      <button class="sub-tab" id="subTabCal" onclick="switchSubTab('cal')">📅 달력</button>
    </div>

    <!-- MEMO PANEL -->
    <div id="memoPanel">
      <textarea class="memo-area" id="memoText" placeholder="오늘의 메모를 입력하세요..."></textarea>
    </div>

    <!-- CALENDAR PANEL -->
    <div id="calPanel" style="display:none;">
      <div class="calendar-wrap">
        <div class="cal-nav">
          <button onclick="calNav(-1)">‹</button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button onclick="calNav(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <div class="task-grid" id="taskGrid" style="margin-top:20px;"></div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 20px;flex-shrink:0;">
      <h3 style="margin:0;">📋 <span id="logDateLabel">오늘</span>의 기록 로그</h3>
      <button onclick="clearAllLogs()" style="background:#f08080;color:white;border:none;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;">전체 삭제</button>
    </div>
    <ul class="log-list" id="logList"></ul>
  </div>

  <div id="tab1" class="tab-content" style="display:none;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-shrink:0;">
      <button onclick="switchTab(0)" style="background:none;border:1px solid #ddd;color:#555;padding:6px 12px;border-radius:8px;font-size:14px;cursor:pointer;">← 돌아가기</button>
      <h2 style="margin:0;">업무 목록 관리</h2>
    </div>
    <div id="manageList"></div>
    <div class="add-area">
      <input type="text" id="newTask" placeholder="새 업무 이름 입력 (예: 코드 리뷰)" onkeydown="if(event.key==='Enter') addNewTask()">
      <button onclick="addNewTask()">추가하기</button>
    </div>
  </div>
</div>
</div><!-- /appScreen -->

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h3>기록 수정</h3>
    <div class="modal-field">
      <label>시간</label>
      <div class="time-picker">
        <div class="time-picker-col">
          <button onclick="adjustTime('h',-1)">▲</button>
          <span id="pickHour" onclick="startEdit('h')">00</span>
          <button onclick="adjustTime('h',1)">▼</button>
        </div>
        <div class="time-sep">:</div>
        <div class="time-picker-col">
          <button onclick="adjustTime('m',-1)">▲</button>
          <span id="pickMin" onclick="startEdit('m')">00</span>
          <button onclick="adjustTime('m',1)">▼</button>
        </div>
      </div>
    </div>
    <div class="modal-field">
      <label>활동</label>
      <input type="text" id="editTask" onkeydown="if(event.key==='Enter') saveEditLog()">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeEditModal()">취소</button>
      <button class="btn-save-modal" onclick="saveEditLog()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRukbtiNHiWQBTIpQin0FZ7SFdZCLxx-k",
  authDomain: "work-timer-aa3e0.firebaseapp.com",
  projectId: "work-timer-aa3e0",
  storageBucket: "work-timer-aa3e0.firebasestorage.app",
  messagingSenderId: "393328038576",
  appId: "1:393328038576:web:94af75c7e54afa1b62a175"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let tasks = ["회의 준비", "보고서 작성", "코드 리뷰", "이메일 처리"];
let logs = [];
let memo = '';
let currentUser = null;

const todayDate = new Date();
let calViewDate = new Date(todayDate.getFullYear(), todayDate.getMonth(), 1);
let selectedDateStr = toDateStr(todayDate);

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ---- AUTH ----
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    listenData();
    setInterval(updateLiveClock, 1000);
    updateLiveClock();
    switchTab(0);
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

window.doLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginErr');
  try {
    await signInWithEmailAndPassword(auth, email, pw);
    err.textContent = '';
  } catch(e) {
    err.textContent = '이메일 또는 비밀번호가 틀렸습니다.';
  }
};

window.doLogout = async function() { await signOut(auth); };
document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });

// ---- FIRESTORE ----
async function saveTasks() {
  if (!currentUser) return;
  await setDoc(doc(db, 'users', currentUser.uid), { tasks }, { merge: true });
}
async function saveLogs() {
  if (!currentUser) return;
  await setDoc(doc(db, 'users', currentUser.uid), { logs }, { merge: true });
}
function listenData() {
  onSnapshot(doc(db, 'users', currentUser.uid), async snap => {
    if (snap.exists()) {
      const data = snap.data();
      if (data.tasks) tasks = data.tasks;
      if (data.logs) logs = data.logs;
      if (data.memo !== undefined) {
        memo = data.memo;
      } else if (data.memos) {
        // 마이그레이션: 날짜별 메모 → 단일 메모
        const combined = Object.entries(data.memos)
          .sort(([a], [b]) => a.localeCompare(b))
          .map(([date, text]) => `[${date}]\n${text}`)
          .join('\n\n');
        memo = combined;
        await setDoc(doc(db, 'users', currentUser.uid), { memo: combined }, { merge: true });
      }
    }
    renderTaskButtons();
    renderCalendar();
    renderLogs();
    renderMemo();
    const tab1 = document.getElementById('tab1');
    if (tab1 && tab1.style.display !== 'none') renderManageList();
  });
}

// ---- SUB TABS ----
window.switchSubTab = function(tab) {
  document.getElementById('memoPanel').style.display = tab === 'memo' ? 'flex' : 'none';
  document.getElementById('memoPanel').style.flexDirection = 'column';
  document.getElementById('calPanel').style.display = tab === 'cal' ? 'block' : 'none';
  document.getElementById('subTabMemo').classList.toggle('active', tab === 'memo');
  document.getElementById('subTabCal').classList.toggle('active', tab === 'cal');
  if (tab === 'cal') renderCalendar();
};

// ---- MEMO ----
function renderMemo() {
  const textarea = document.getElementById('memoText');
  if (!textarea) return;
  textarea.value = memo || '';
}

window.saveMemo = async function() {
  if (!currentUser) return;
  const text = document.getElementById('memoText').value;
  await setDoc(doc(db, 'users', currentUser.uid), { memo: text }, { merge: true });
};

// 자동 저장 (3초 디바운스)
let memoSaveTimer = null;
document.addEventListener('DOMContentLoaded', () => {
  const textarea = document.getElementById('memoText');
  if (textarea) {
    textarea.addEventListener('input', () => {
      clearTimeout(memoSaveTimer);
      memoSaveTimer = setTimeout(() => window.saveMemo(), 3000);
    });
  }
});

// ---- CLOCK ----
function updateLiveClock() {
  const el = document.getElementById('liveClock');
  if (el) el.textContent = new Date().toLocaleString('ko-KR', { year:'numeric', month:'long', day:'numeric', hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true });
}

// ---- TABS ----
window.switchTab = function(n) {
  document.getElementById('tab0').style.display = n === 0 ? 'flex' : 'none';
  document.getElementById('tab1').style.display = n === 1 ? 'flex' : 'none';
  if (n === 0) renderTaskButtons();
  if (n === 1) renderManageList();
};

// ---- CALENDAR ----
function renderCalendar() {
  const yr = calViewDate.getFullYear(), mo = calViewDate.getMonth();
  document.getElementById('calMonthLabel').textContent = `${yr}년 ${mo+1}월`;
  const firstDay = new Date(yr, mo, 1).getDay();
  const lastDate = new Date(yr, mo+1, 0).getDate();
  const todayStr = toDateStr(todayDate);
  const logDates = new Set(logs.map(l => toDateStr(new Date(l.rawTime))));
  let html = ['일','월','화','수','목','금','토'].map(d => `<div class="cal-day-header">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) {
    const d = new Date(yr, mo, -firstDay+i+1), ds = toDateStr(d);
    html += `<div class="cal-day other-month ${ds===selectedDateStr?'selected':''} ${logDates.has(ds)?'has-log':''}" onclick="selectDate('${ds}')">${d.getDate()}</div>`;
  }
  for (let d = 1; d <= lastDate; d++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = ['cal-day', ds===todayStr?'today':'', ds===selectedDateStr?'selected':'', logDates.has(ds)?'has-log':''].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="selectDate('${ds}')">${d}</div>`;
  }
  for (let i = 1; i <= 42 - firstDay - lastDate; i++) {
    const d = new Date(yr, mo+1, i), ds = toDateStr(d);
    html += `<div class="cal-day other-month ${ds===selectedDateStr?'selected':''} ${logDates.has(ds)?'has-log':''}" onclick="selectDate('${ds}')">${i}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}
window.calNav = function(dir) { calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + dir, 1); renderCalendar(); };
window.selectDate = function(ds) {
  selectedDateStr = ds; renderCalendar(); renderLogs();
  const [y,m,d] = ds.split('-');
  document.getElementById('logDateLabel').textContent = ds === toDateStr(todayDate) ? '오늘' : `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
};

// ---- TASK BUTTONS ----
function renderTaskButtons() {
  const grid = document.getElementById('taskGrid');
  grid.innerHTML = '';
  tasks.forEach(task => {
    const btn = document.createElement('button');
    btn.className = 'task-btn'; btn.textContent = task;
    btn.onclick = () => recordTime(task);
    grid.appendChild(btn);
  });
}
async function recordTime(taskName) {
  const now = new Date();
  const newLog = { task: taskName, timestamp: now.toLocaleString('ko-KR', { year:'numeric', month:'long', day:'numeric', hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true }), rawTime: now.getTime() };
  const newLogs = [newLog, ...logs].slice(0, 100);
  await setDoc(doc(db, 'users', currentUser.uid), { logs: newLogs }, { merge: true });
}

// ---- LOGS ----
function renderLogs() {
  const list = document.getElementById('logList');
  list.innerHTML = '';
  const filtered = logs.filter(l => toDateStr(new Date(l.rawTime)) === selectedDateStr);
  if (filtered.length === 0) { list.innerHTML = `<div class="empty">이 날의 기록이 없습니다.</div>`; return; }
  filtered.sort((a, b) => a.rawTime - b.rawTime);
  filtered.forEach(log => {
    const d = new Date(log.rawTime);
    const shortTime = d.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12:false });
    const li = document.createElement('li');
    li.className = 'log-item';
    li.innerHTML = `<div class="log-time">${shortTime}</div><div><strong>${log.task}</strong></div><div style="display:flex;gap:6px;"><button class="edit-btn" onclick="openEditModal('${log.rawTime}')">수정</button><button class="delete-btn" onclick="deleteLog('${log.rawTime}')">삭제</button></div>`;
    list.appendChild(li);
  });
}
window.clearAllLogs = async function() {
  const label = document.getElementById('logDateLabel').textContent;
  if (!confirm(`"${label}"의 기록을 전체 삭제할까요?`)) return;
  const newLogs = logs.filter(l => toDateStr(new Date(l.rawTime)) !== selectedDateStr);
  await setDoc(doc(db, 'users', currentUser.uid), { logs: newLogs }, { merge: true });
};
window.deleteLog = async function(rawTime) {
  const log = logs.find(l => l.rawTime == rawTime);
  if (!log) return;
  if (!confirm(`"${log.task}" 기록을 정말 삭제할까요?`)) return;
  const newLogs = logs.filter(l => l.rawTime != rawTime);
  await setDoc(doc(db, 'users', currentUser.uid), { logs: newLogs }, { merge: true });
};

// ---- MANAGE ----
function renderManageList() {
  const container = document.getElementById('manageList');
  container.innerHTML = '';
  tasks.forEach((task, i) => {
    const div = document.createElement('div');
    div.className = 'task-manage-item'; div.dataset.index = i;
    div.innerHTML = `<span class="drag-handle">⠿</span><span class="task-name" style="font-size:1.05rem;flex:1;">${task}</span><div style="display:flex;gap:6px;"><button class="edit-btn" onclick="editTask(${i}, this)">수정</button><button class="delete-btn" onclick="deleteTask(${i})">삭제</button></div>`;
    container.appendChild(div);
  });
  enableDragSort(container);
}
function enableDragSort(container) {
  let dragSrcIndex = null, touchDragEl = null, touchClone = null, touchSrcIndex = null;
  container.querySelectorAll('.task-manage-item').forEach(div => {
    const handle = div.querySelector('.drag-handle');
    const i = parseInt(div.dataset.index);
    handle.addEventListener('mousedown', () => { div.draggable = true; });
    div.addEventListener('dragstart', () => { dragSrcIndex = i; setTimeout(() => div.classList.add('dragging'), 0); });
    div.addEventListener('dragend', () => { div.draggable = false; div.classList.remove('dragging'); container.querySelectorAll('.task-manage-item').forEach(el => el.classList.remove('drag-over')); });
    div.addEventListener('dragover', e => { e.preventDefault(); container.querySelectorAll('.task-manage-item').forEach(el => el.classList.remove('drag-over')); div.classList.add('drag-over'); });
    div.addEventListener('drop', async e => {
      e.preventDefault(); const ti = parseInt(div.dataset.index);
      if (dragSrcIndex === null || dragSrcIndex === ti) return;
      const newTasks = [...tasks];
      const moved = newTasks.splice(dragSrcIndex, 1)[0];
      newTasks.splice(ti, 0, moved);
      await setDoc(doc(db, 'users', currentUser.uid), { tasks: newTasks }, { merge: true });
    });
    handle.addEventListener('touchstart', e => {
      e.preventDefault(); touchSrcIndex = i; touchDragEl = div; div.classList.add('dragging');
      touchClone = div.cloneNode(true);
      const rect = div.getBoundingClientRect();
      touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;pointer-events:none;z-index:9999;margin:0;`;
      document.body.appendChild(touchClone);
    }, { passive: false });
    handle.addEventListener('touchmove', e => {
      e.preventDefault(); if (!touchClone) return;
      const touch = e.touches[0];
      touchClone.style.top = (touch.clientY - touchClone.offsetHeight / 2) + 'px';
      container.querySelectorAll('.task-manage-item').forEach(el => el.classList.remove('drag-over'));
      const target = [...container.querySelectorAll('.task-manage-item')].find(el => { const r = el.getBoundingClientRect(); return touch.clientY >= r.top && touch.clientY <= r.bottom; });
      if (target && target !== touchDragEl) target.classList.add('drag-over');
    }, { passive: false });
    handle.addEventListener('touchend', async e => {
      e.preventDefault();
      if (touchClone) { touchClone.remove(); touchClone = null; }
      if (touchDragEl) touchDragEl.classList.remove('dragging');
      const target = [...container.querySelectorAll('.task-manage-item')].find(el => el.classList.contains('drag-over'));
      container.querySelectorAll('.task-manage-item').forEach(el => el.classList.remove('drag-over'));
      if (target) {
        const ti = parseInt(target.dataset.index);
        if (touchSrcIndex !== null && touchSrcIndex !== ti) {
          const newTasks = [...tasks];
          const moved = newTasks.splice(touchSrcIndex, 1)[0];
          newTasks.splice(ti, 0, moved);
          await setDoc(doc(db, 'users', currentUser.uid), { tasks: newTasks }, { merge: true });
        }
      }
      touchDragEl = null; touchSrcIndex = null;
    }, { passive: false });
  });
}
window.addNewTask = async function() {
  const input = document.getElementById('newTask');
  const name = input.value.trim();
  if (!name) { alert('업무 이름을 입력해주세요!'); return; }
  if (tasks.includes(name)) { alert('이미 존재하는 업무예요!'); return; }
  const newTasks = [...tasks, name];
  await setDoc(doc(db, 'users', currentUser.uid), { tasks: newTasks }, { merge: true });
  input.value = '';
};
window.editTask = function(index, btn) {
  const div = btn.closest('.task-manage-item');
  const nameSpan = div.querySelector('.task-name');
  const currentName = tasks[index];
  const input = document.createElement('input');
  input.type = 'text'; input.value = currentName;
  input.style.cssText = 'flex:1;font-size:1rem;padding:4px 8px;border:2px solid var(--primary);border-radius:6px;outline:none;';
  nameSpan.replaceWith(input); input.focus(); input.select();
  btn.textContent = '저장'; btn.onclick = () => commitEdit();
  async function commitEdit() {
    const newName = input.value.trim();
    if (!newName) { alert('업무 이름을 입력해주세요!'); return; }
    if (newName !== currentName && tasks.includes(newName)) { alert('이미 존재하는 업무예요!'); return; }
    const newTasks = [...tasks];
    newTasks[index] = newName;
    await setDoc(doc(db, 'users', currentUser.uid), { tasks: newTasks }, { merge: true });
  }
  input.addEventListener('keydown', e => { if (e.key === 'Enter') commitEdit(); if (e.key === 'Escape') renderManageList(); });
};
window.deleteTask = async function(index) {
  if (!confirm(`"${tasks[index]}" 업무를 정말 삭제할까요?`)) return;
  const newTasks = tasks.filter((_, i) => i !== index);
  await setDoc(doc(db, 'users', currentUser.uid), { tasks: newTasks }, { merge: true });
};

// ---- EDIT MODAL ----
let editTargetRawTime = null, pickH = 0, pickM = 0;
window.startEdit = function(unit) {
  const spanId = unit === 'h' ? 'pickHour' : 'pickMin';
  const span = document.getElementById(spanId);
  const max = unit === 'h' ? 23 : 59, current = unit === 'h' ? pickH : pickM;
  const input = document.createElement('input');
  input.type = 'number'; input.min = 0; input.max = max; input.value = current;
  input.style.cssText = 'width:48px;text-align:center;font-size:1.3rem;font-weight:700;border:2px solid var(--primary);border-radius:8px;padding:4px 0;outline:none;background:#f0f4f8;color:#2c3e50;';
  span.replaceWith(input); input.focus(); input.select();
  function commit() {
    let val = parseInt(input.value); if (isNaN(val)) val = current;
    val = Math.min(max, Math.max(0, val));
    if (unit === 'h') pickH = val; else pickM = val;
    const newSpan = document.createElement('span');
    newSpan.id = spanId; newSpan.style.cursor = 'text';
    newSpan.textContent = String(val).padStart(2,'0');
    newSpan.onclick = () => window.startEdit(unit);
    input.replaceWith(newSpan);
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = current; input.blur(); } });
};
window.adjustTime = function(unit, dir) {
  if (unit === 'h') pickH = (pickH + dir + 24) % 24;
  else pickM = (pickM + dir + 60) % 60;
  document.getElementById('pickHour').textContent = String(pickH).padStart(2,'0');
  document.getElementById('pickMin').textContent = String(pickM).padStart(2,'0');
};
window.openEditModal = function(rawTime) {
  const log = logs.find(l => l.rawTime == rawTime); if (!log) return;
  editTargetRawTime = rawTime;
  const d = new Date(log.rawTime); pickH = d.getHours(); pickM = d.getMinutes();
  document.getElementById('pickHour').textContent = String(pickH).padStart(2,'0');
  document.getElementById('pickMin').textContent = String(pickM).padStart(2,'0');
  document.getElementById('editTask').value = log.task;
  document.getElementById('editModal').classList.add('open');
};
window.closeEditModal = function() { document.getElementById('editModal').classList.remove('open'); editTargetRawTime = null; };
window.saveEditLog = async function() {
  const idx = logs.findIndex(l => l.rawTime == editTargetRawTime); if (idx === -1) return;
  const newTask = document.getElementById('editTask').value.trim(); if (!newTask) return;
  const d = new Date(logs[idx].rawTime); d.setHours(pickH, pickM, 0, 0);
  const newLogs = [...logs];
  newLogs[idx] = { ...newLogs[idx], rawTime: d.getTime(), task: newTask, timestamp: d.toLocaleString('ko-KR', { year:'numeric', month:'long', day:'numeric', hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true }) };
  await setDoc(doc(db, 'users', currentUser.uid), { logs: newLogs }, { merge: true });
  window.closeEditModal();
};
</script>
